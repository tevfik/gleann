name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Cross-Platform Build & Test ──────────────────────────────
  test:
    name: Test (${{ matrix.os }} / Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.25"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (unit + integration)
        timeout-minutes: 10
        run: go test -v -race -timeout 8m -coverprofile=coverage.out $(go list ./... | grep -v /tests/benchmarks)
        shell: bash

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: false
          verbose: true

  # ── Build Verification (all platforms, both tags) ────────────
  build-check:
    name: Build (${{ matrix.os }} / ${{ matrix.tags }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        tags: ["", "treesitter"]
        exclude:
          # treesitter (CGo) requires C toolchain — skip on Windows for now
          - os: windows-latest
            tags: treesitter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            go build -tags ${{ matrix.tags }} -o /dev/null ./cmd/gleann/
          else
            go build -o /dev/null ./cmd/gleann/
          fi
        shell: bash

  # ── Documentation Drift Check ────────────────────────────────
  doc-drift:
    name: Doc Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run doc-drift detector
        run: bash scripts/doc-drift.sh
