name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Test
        run: go test -race $(go list ./... | grep -v /benchmarks)

  # ── Pure Go builds (all platforms, no CGo) ──
  release-pure:
    name: Build Pure Go (${{ matrix.suffix }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
          - goos: windows
            goarch: arm64
            suffix: windows-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build gleann
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.version.outputs.version }}
        run: make

      - name: Compress binary
        run: |
          mkdir -p dist
          BINARY="build/gleann"
          OUTNAME="gleann"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="build/gleann.exe"
            OUTNAME="gleann.exe"
          fi
          SUFFIX="gleann-${{ steps.version.outputs.version }}-${{ matrix.suffix }}"
          cp "${BINARY}" "${OUTNAME}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "dist/${SUFFIX}.zip" "${OUTNAME}"
          else
            tar czf "dist/${SUFFIX}.tar.gz" "${OUTNAME}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gleann-${{ matrix.suffix }}
          path: dist/*
          retention-days: 1

  # ── FAISS + Tree-sitter build (Linux amd64 only, requires CGo) ──
  release-faiss:
    name: Build FAISS+TreeSitter (linux-amd64)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install FAISS and Tree-sitter dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libopenblas-dev libomp-dev swig

      - name: Build and install FAISS from source
        run: |
          git clone --depth 1 --branch v1.9.0 https://github.com/facebookresearch/faiss.git /tmp/faiss
          cd /tmp/faiss
          cmake -B build \
            -DFAISS_ENABLE_GPU=OFF \
            -DFAISS_ENABLE_PYTHON=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build -j$(nproc)
          sudo cmake --install build

          # Build FAISS C API wrapper (not built by cmake)
          cd /tmp/faiss
          g++ -shared -fPIC -Wl,-rpath='$$ORIGIN' -o libfaiss_c.so \
            c_api/*.cpp \
            -I. -I/usr/local/include \
            -L/usr/local/lib -lfaiss \
            -lstdc++ -lgomp -lopenblas
          sudo cp libfaiss_c.so /usr/local/lib/
          # Install C API headers including impl/ subdirectory
          sudo mkdir -p /usr/local/include/faiss/c_api/impl
          sudo cp c_api/*.h /usr/local/include/faiss/c_api/
          sudo cp c_api/impl/*.h /usr/local/include/faiss/c_api/impl/
          sudo ldconfig

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build gleann-full (FAISS + Tree-sitter)
        env:
          CGO_ENABLED: "1"
          LD_LIBRARY_PATH: "/usr/local/lib"
          VERSION: ${{ steps.version.outputs.version }}
          FAISS_LIB_DIR: "/usr/local/lib"
        run: make full

      - name: Rename and compress binary with shared libraries
        run: |
          mkdir -p dist
          SUFFIX="gleann-full-${{ steps.version.outputs.version }}-linux-amd64"
          cp build/gleann-full "${SUFFIX}"
          cp /usr/local/lib/libfaiss_c.so . 2>/dev/null || true
          cp /usr/local/lib/libfaiss.so   . 2>/dev/null || true
          tar czf "dist/${SUFFIX}.tar.gz" "${SUFFIX}" libfaiss*.so 2>/dev/null; true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gleann-full-linux-amd64
          path: dist/*
          retention-days: 1

  publish-release:
    name: Publish Release
    needs: [release-pure, release-faiss]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
