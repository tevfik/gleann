name: doc-drift

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'scripts/doc-drift.sh'
      - '.github/workflows/doc-drift.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'scripts/doc-drift.sh'

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run doc-drift detector
        run: bash scripts/doc-drift.sh
